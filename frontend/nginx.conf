server {
    listen 80;
    server_name _;
    client_max_body_size 20m;

    root /usr/share/nginx/html;
    index index.html;

    # Security Headers (CSP kommt vom Backend — hier nicht duplizieren)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), camera=(self), microphone=()" always;

    # Statische Dateien mit Caching
    location ~* \.(js|css|png|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # API-Anfragen zum Backend weiterleiten
    location /api/ {
        proxy_pass http://backend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA: alle anderen Routen → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
